<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d3702f"/>
      <stop offset="1" stop-color="#9a3f17"/>
    </linearGradient>
    <linearGradient id="glass" x1="256" y1="120" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="1" stop-color="#f0ebe3"/>
    </linearGradient>
    <radialGradient id="sheen" cx="190" cy="150" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#sheen)"/>

  <!-- fuel can body -->
  <g>
    <path d="M225 152
             L255 122
             L300 122
             L300 96
             L320 96
             L320 122
             L325 122
             L375 172
             L375 388
             A18 18 0 0 1 357 406
             L173 406
             A18 18 0 0 1 155 388
             L155 198
             A18 18 0 0 1 173 180
             L207 180
             Z"
          fill="url(#glass)" stroke="#9a3f17" stroke-width="10" stroke-linejoin="round"/>

    <!-- handle cutout -->
    <path d="M255 152 L300 152 L300 122 L255 122 Z" fill="url(#bg)" stroke="#9a3f17" stroke-width="10" stroke-linejoin="round"/>

    <!-- fill level band -->
    <rect x="173" y="300" width="184" height="74" rx="10" fill="#d3702f"/>

    <!-- gauge dots -->
    <circle cx="225" cy="337" r="13" fill="#fffdfa"/>
    <circle cx="287" cy="337" r="13" fill="#fffdfa"/>

    <!-- drop accent -->
    <path d="M392 150
             c0 22 -18 30 -18 50
             a18 18 0 0 0 36 0
             c0 -20 -18 -28 -18 -50 Z"
          fill="#fffdfa"/>
  </g>
</svg>
