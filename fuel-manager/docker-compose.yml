services:
  fuel-manager:
    build: .
    container_name: fuel-manager
    restart: always
    network_mode: bridge
    ports:
      # Solo localhost: l'app NON è raggiungibile dalla rete Tailscale né da altre interfacce
      - "127.0.0.1:8600:8599"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Rome
      - DATA_DIR=/app/data
